<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Match Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Number Match Game</h1>
            <p class="subtitle">Test your memory and matching skills!</p>
        </header>

        <div class="game-info">
            <div class="info-box">
                <span class="label">Score:</span>
                <span class="value" id="score">0</span>
            </div>
            <div class="info-box">
                <span class="label">Moves:</span>
                <span class="value" id="moves">0</span>
            </div>
            <div class="info-box">
                <span class="label">Best Score:</span>
                <span class="value" id="best-score">0</span>
            </div>
        </div>

        <div class="difficulty-selector">
            <label for="difficulty">Difficulty:</label>
            <select id="difficulty" onchange="changeDifficulty()">
                <option value="easy">Easy (4x4)</option>
                <option value="medium" selected>Medium (4x6)</option>
                <option value="hard">Hard (6x6)</option>
            </select>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="resetGame()">New Game</button>
            <button class="btn btn-secondary" onclick="undoMove()">Undo</button>
        </div>

        <div class="stats">
            <h3>Game Stats</h3>
            <p id="gameStatus">Ready to play!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
