<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Test Page</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .hero { background: lightblue; padding: 50px; text-align: center; }
        .content-section { padding: 20px; }
    </style>
</head>
<body>
    <div class="language-switcher">
        <button onclick="switchLanguage('en')">English</button>
        <button onclick="switchLanguage('es')">Spanish</button>
    </div>
    <header class="hero">
        <h1>Welcome to My Test Page</h1>
        <p>This is a hero section.</p>
    </header>
    <section id="about">
        <h2>About</h2>
        <p>This section is all about multilingual support.</p>
    </section>
    <section id="services">
        <h2>Services</h2>
        <p>These are the services we offer.</p>
    </section>
    <section id="contact">
        <h2>Contact</h2>
        <p>Get in touch with us!</p>
    </section>
    <script>
        function switchLanguage(lang) {
            // Add functionality to switch languages here
            alert('Language switched to: ' + lang);
        }
    </script>
</body>
</html>
